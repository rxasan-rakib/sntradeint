<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP Verification | SN Trade International</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #f8f9fa;
        }

        .auth-wrapper {
            padding: 80px 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .auth-card {
            background: #fff;
            border-radius: 12px;
            padding: 50px 40px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.05);
            border: 1px solid #eee;
        }

        .otp-input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            border: 2px solid #eee;
            border-radius: 8px;
            margin: 0 5px;
        }

        .otp-input:focus {
            border-color: #00B159;
            outline: none;
            box-shadow: 0 0 0 0.25rem rgba(0, 177, 89, 0.1);
        }

        .btn-auth {
            background: #00B159;
            color: #fff;
            font-weight: 700;
            padding: 14px;
            border-radius: 6px;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-auth:hover {
            background: #008f48;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 177, 89, 0.2);
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-8">
                    <div class="auth-card">
                        <!-- Logo inside card -->
                        <div class="text-center mb-1">
                            <a href="index.html">
                                <img src="assets/logocopy.png" alt="Logo" style="height: 80px;">
                            </a>
                        </div>
                        <h3 class="fw-bold mb-2 text-center">Verify OTP</h3>
                        <p class="text-center text-muted mb-5 small">We've sent a 4-digit code to your email/phone. Please enter it below.</p>
                        <form>
                            <div class="d-flex justify-content-center mb-5">
                                <input type="text" class="otp-input" maxlength="1" onkeyup="moveNext(this, 'otp2')">
                                <input type="text" id="otp2" class="otp-input" maxlength="1" onkeyup="moveNext(this, 'otp3')">
                                <input type="text" id="otp3" class="otp-input" maxlength="1" onkeyup="moveNext(this, 'otp4')">
                                <input type="text" id="otp4" class="otp-input" maxlength="1">
                            </div>
                            <button type="submit" class="btn-auth w-100 mb-4">VERIFY OTP</button>
                            
                            <div class="text-center text-muted small">
                                Didn't receive code? <a href="#" class="text-success fw-bold text-decoration-none">Resend OTP</a>
                            </div>
                        </form>
                    </div>
                    <div class="text-center mt-5">
                        <a href="forgot-password.html" class="text-muted small text-decoration-none"><i class="fas fa-arrow-left me-2"></i> Back</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Core JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function moveNext(current, nextId) {
            if (current.value.length >= 1) {
                document.getElementById(nextId).focus();
            }
        }
    </script>
</body>

</html>
