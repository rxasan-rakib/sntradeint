<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | SN Trade International</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #f8f9fa;
        }

        .auth-wrapper {
            padding: 80px 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .auth-card {
            background: #fff;
            border-radius: 12px;
            padding: 50px 40px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.05);
            border: 1px solid #eee;
        }

        .form-control:focus {
            border-color: #00B159;
            box-shadow: 0 0 0 0.25rem rgba(0, 177, 89, 0.1);
        }

        .btn-auth {
            background: #00B159;
            color: #fff;
            font-weight: 700;
            padding: 14px;
            border-radius: 6px;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-auth:hover {
            background: #008f48;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 177, 89, 0.2);
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-8">
                    <div class="auth-card">
                        <!-- Logo inside card -->
                        <div class="text-center mb-1">
                            <a href="index.html">
                                <img src="assets/logocopy.png" alt="Logo" style="height: 80px;">
                            </a>
                        </div>
                        <h3 class="fw-bold mb-2 text-center">Forgot Password?</h3>
                        <p class="text-center text-muted mb-5 small">Enter your email or phone number to reset your password.</p>
                        <form>
                            <div class="mb-4">
                                <label class="form-label small fw-bold text-muted">Email or Phone Number</label>
                                <input type="text" class="form-control py-3" placeholder="Enter your email or phone">
                            </div>
                            <button type="button" onclick="window.location.href='otp-verify.html'" class="btn-auth w-100 mb-4">RESET PASSWORD</button>
                            
                            <div class="text-center text-muted small">
                                Remembered your password? <a href="login.html" class="text-success fw-bold text-decoration-none">Login Here</a>
                            </div>
                        </form>
                    </div>
                    <div class="text-center mt-5">
                        <a href="index.html" class="text-muted small text-decoration-none"><i class="fas fa-arrow-left me-2"></i> Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Core JS -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
